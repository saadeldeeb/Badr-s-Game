<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation vs. Animator: Pixel Ultimate Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }
        #game-wrapper {
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.95);
            border-radius: 16px;
            overflow: hidden;
            border: 6px solid #161626;
        }
        canvas {
            display: block;
            background: #4fc3f7;
        }
        .hud-layer {
            position: absolute;
            top: 25px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 2px 2px 0px #000;
        }
        .hud-card {
            width: 420px;
            background: rgba(4, 4, 10, 0.85);
            border: 4px solid #fff;
            padding: 10px;
            box-sizing: border-box;
        }
        .bar-outer {
            background: #111;
            height: 22px;
            border: 3px solid #fff;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .bar-inner {
            height: 100%;
            width: 100%;
            transition: width 0.05s linear;
        }
        .p1-hp-fill { background: linear-gradient(90deg, #ff4500, #ffaa00); }
        .p2-hp-fill { background: linear-gradient(90deg, #0055ff, #00d4ff); }
        
        .energy-outer {
            background: #05050a;
            height: 10px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .energy-inner {
            height: 100%;
            width: 100%;
            background: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
        }
        #instructions-panel {
            margin-top: 15px;
            font-size: 13px;
            color: #727293;
            text-align: center;
            line-height: 1.6;
            background: rgba(10, 10, 20, 0.6);
            padding: 10px 30px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div class="hud-layer" id="combatHUD" style="display: none;">
            <div class="hud-card">
                <div id="p1-tag" style="margin-bottom: 4px; color: #ff6600;">Player 1</div>
                <div class="bar-outer"><div id="p1-hp" class="bar-inner p1-hp-fill"></div></div>
                <div class="energy-outer"><div id="p1-energy" class="energy-inner"></div></div>
            </div>
            <div class="hud-card" style="text-align: right;">
                <div id="p2-tag" style="margin-bottom: 4px; color: #00aaff;">Player 2</div>
                <div class="bar-outer"><div id="p2-hp" class="bar-inner p2-hp-fill"></div></div>
                <div class="energy-outer"><div id="p2-energy" class="energy-inner" style="margin-left:auto;"></div></div>
            </div>
        </div>
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
    </div>

    <div id="instructions-panel">
        <strong>The Chosen One [TCO]:</strong> Pure Black Silhouette Form \| Double-Tap W/↑ to Fly \| Double-Tap A,D/←,→ to Dash \| Hold Attack for Tele-Explosion <br>
        <strong>Orange (TSC):</strong> Tap H / J for Eye Lasers! Tap G / M at full energy for 5s Awakened Flying God Mode!
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const combatHUD = document.getElementById('combatHUD');

ctx.imageSmoothingEnabled = false;

const SCENE_MENU = 0;
const SCENE_FIGHT = 1;
const SCENE_OVER = 2;
let currentScene = SCENE_MENU;

let screenShake = 0;
let hitStopTimer = 0;

const ROSTER = {
    orange: { name: 'TSC (Orange)', color: '#ff6600', awakenedColor: '#00ff66', hollow: true, weaponName: 'Cursor Stylus' },
    chosen: { name: 'The Chosen One', color: '#000000', hollow: true, weaponName: 'Fire & Ice Fists' },
    green:  { name: 'Green', color: '#2cdb2c', hollow: false, weaponName: 'Fishing Rod' },
    red:    { name: 'Red', color: '#ff2a2a', hollow: false, weaponName: 'Martial Fists' },
    blue:   { name: 'Blue', color: '#2a75ff', hollow: false, weaponName: 'Potion Bottle' },
    yellow: { name: 'Yellow', color: '#f7f711', hollow: false, weaponName: 'Grey Laptop' }
};

const rosterKeys = Object.keys(ROSTER);
let p1Sel = 0;
let p2Sel = 1;
let p1Ready = false;
let p2Ready = false;

const gravity = 0.65;
const floorY = 610;

const input = {};
const keyTapTiming = {};
const inputDuration = {}; 

window.addEventListener('keydown', e => {
    const now = performance.now();
    
    if (!input[e.code]) {
        if (now - (keyTapTiming[e.code] || 0) < 250) {
            if (currentScene === SCENE_FIGHT) {
                if (e.code === 'KeyW' && player1) player1.doubleWTrigger = true;
                if (e.code === 'KeyD' && player1) player1.doubleDTrigger = true;
                if (e.code === 'KeyA' && player1) player1.doubleATrigger = true;
                if (e.code === 'ArrowUp' && player2) player2.doubleWTrigger = true;
                if (e.code === 'ArrowRight' && player2) player2.doubleDTrigger = true;
                if (e.code === 'ArrowLeft' && player2) player2.doubleATrigger = true;
            }
        }
        keyTapTiming[e.code] = now;
    }
    input[e.code] = true;
    
    if (currentScene === SCENE_MENU) {
        if (e.code === 'KeyA') p1Sel = (p1Sel - 1 + rosterKeys.length) % rosterKeys.length;
        if (e.code === 'KeyD') p1Sel = (p1Sel + 1) % rosterKeys.length;
        if (e.code === 'KeyF') p1Ready = true;
        
        if (e.code === 'ArrowLeft') p2Sel = (p2Sel - 1 + rosterKeys.length) % rosterKeys.length;
        if (e.code === 'ArrowRight') p2Sel = (p2Sel + 1) % rosterKeys.length;
        if (e.code === 'KeyM') p2Ready = true;

        if (p1Ready && p2Ready) beginMatch();
    }
});

window.addEventListener('keyup', e => {
    input[e.code] = false;
    inputDuration[e.code] = 0; 
});

const blockyCloudsArray = [
    { x: 80, y: 70, w: 200, h: 45, speed: 0.35 },
    { x: 550, y: 120, w: 260, h: 55, speed: 0.22 },
    { x: 1000, y: 80, w: 170, h: 40, speed: 0.45 }
];

let liveProjectiles = [];
let liveParticles = [];

class Fighter {
    constructor(id, startX, faceDir, characterKey) {
        this.id = id;
        this.x = startX;
        this.y = 300;
        this.vx = 0;
        this.vy = 0;
        this.w = 65;
        this.h = 135;
        this.charKey = characterKey;
        this.meta = ROSTER[characterKey];
        
        this.hp = 250;
        this.maxHp = 250;
        this.energy = 100;
        this.grounded = false;
        this.facing = faceDir;
        
        this.attackTimer = 0;
        this.specialTimer = 0;
        this.stunTimer = 0;
        this.frozenTimer = 0;
        this.eyeLaserActiveTimer = 0; 
        this.farAttackVisualTimer = 0; 
        
        this.isFlying = false;
        this.flightFuel = 300; 
        this.dashTimer = 0;
        this.awakenedTimer = 0;

        this.doubleWTrigger = false;
        this.doubleDTrigger = false;
        this.doubleATrigger = false;

        this.squashX = 1;
        this.squashY = 1;
        this.motionTrail = [];
    }

    update(bindings, target) {
        this.motionTrail.push({ x: this.x + this.w/2, y: this.y + 60 });
        if(this.motionTrail.length > 8) this.motionTrail.shift();

        if (this.frozenTimer > 0) {
            this.frozenTimer--;
            this.vx = 0;
            this.vy += gravity;
            this.isFlying = false;
            this.keepInStageBounds();
            return;
        }

        if (this.stunTimer > 0 && !(this.charKey === 'orange' && this.awakenedTimer > 0)) {
            this.stunTimer--;
            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.keepInStageBounds();
            return;
        } else if (this.stunTimer > 0) {
            this.stunTimer = 0; 
        }

        let lookDir = this.facing === 'right' ? 1 : -1;

        if (this.dashTimer > 0) {
            this.dashTimer--;
            this.vx = lookDir * 21;
            this.vy = 0;
            spawnSquarePixelParticles(this.x + this.w/2 - (lookDir * 35), this.y + this.h/2, '#ff4500', 4);
            this.x += this.vx;
            this.keepInStageBounds();
            return;
        }

        if (this.charKey === 'chosen' && this.grounded) {
            if (this.doubleDTrigger) { this.dashTimer = 14; this.facing = 'right'; this.doubleDTrigger = false; }
            if (this.doubleATrigger) { this.dashTimer = 14; this.facing = 'left'; this.doubleATrigger = false; }
        }
        this.doubleDTrigger = false; this.doubleATrigger = false;

        if (this.charKey === 'orange' && this.awakenedTimer > 0) {
            this.isFlying = true;
            if (input[bindings.left]) { this.vx = -11.5; this.facing = 'left'; }
            else if (input[bindings.right]) { this.vx = 11.5; this.facing = 'right'; }
            else this.vx *= 0.75;

            if (input[bindings.up]) this.vy = -11.5;
            else if (input[bindings.down]) this.vy = 11.5;
            else this.vy *= 0.75;

            spawnSquarePixelParticles(this.x + this.w/2, this.y + this.h, '#00ff66', 2);
        } else {
            if (input[bindings.left]) {
                this.vx = -7.5;
                this.facing = 'left';
            } else if (input[bindings.right]) {
                this.vx = 7.5; 
                this.facing = 'right';
            } else {
                this.vx *= 0.72;
            }
        }

        if (input[bindings.up] && this.grounded && !(this.charKey === 'orange' && this.awakenedTimer > 0)) {
            this.vy = -18;
            this.grounded = false;
            this.squashX = 0.75; this.squashY = 1.25;
            spawnSquarePixelParticles(this.x + this.w/2, floorY, '#8d6e63', 4);
            input[bindings.up] = false;
        }

        if (this.charKey === 'chosen') {
            if (this.doubleWTrigger && !this.grounded && this.flightFuel > 0) {
                this.isFlying = !this.isFlying;
                this.doubleWTrigger = false;
            }

            if (this.isFlying) {
                this.flightFuel--;
                if (input[bindings.up]) this.vy = -7;
                else if (input[bindings.down]) this.vy = 7;
                else this.vy = -0.5;
                
                spawnSquarePixelParticles(this.x + 8, this.y + 75, '#ff3300', 3);
                spawnSquarePixelParticles(this.x + this.w - 8, this.y + 75, '#ffaa00', 3);

                if (this.flightFuel <= 0) this.isFlying = false;
            } else {
                if (this.grounded && this.flightFuel < 300) this.flightFuel += 1.5;
            }
        }
        this.doubleWTrigger = false;

        if (input[bindings.holdKey]) {
            inputDuration[bindings.holdKey] = (inputDuration[bindings.holdKey] || 0) + 1;
            if (this.charKey === 'chosen' && inputDuration[bindings.holdKey] >= 18 && this.attackTimer === 0) {
                this.triggerLongRangeFarAttack(target);
                inputDuration[bindings.holdKey] = 0; 
            }
        }

        if (this.charKey === 'red' && this.specialTimer > 0) {
            if (this.specialTimer === 44) { this.vy = -16; this.vx = lookDir * 8; this.grounded = false; }
            if (this.specialTimer === 22) { this.vy = 26; this.vx = 0; }
        }

        if (this.attackTimer > 0) this.attackTimer--;
        if (this.specialTimer > 0) this.specialTimer--;
        if (this.eyeLaserActiveTimer > 0) this.eyeLaserActiveTimer--;
        if (this.farAttackVisualTimer > 0) this.farAttackVisualTimer--;
        
        if (this.awakenedTimer > 0) {
            this.awakenedTimer--;
            if (this.awakenedTimer <= 0) this.isFlying = false;
        }

        if (!this.isFlying && !(this.charKey === 'red' && this.specialTimer > 22)) {
            this.vy += gravity;
        } else if (this.isFlying && !(this.charKey === 'orange' && this.awakenedTimer > 0)) {
            this.vy *= 0.85;
        }

        this.x += this.vx;
        this.y += this.vy;

        this.squashX += (1 - this.squashX) * 0.15;
        this.squashY += (1 - this.squashY) * 0.15;

        this.keepInStageBounds();

        if (this.energy < 100) this.energy += 0.25;

        if (input[bindings.attack] && this.attackTimer === 0) {
            setTimeout(() => {
                if (!input[bindings.holdKey] && this.attackTimer === 0 && currentScene === SCENE_FIGHT) {
                    this.meleeStrike(target);
                }
            }, 100);
        }
        if (input[bindings.special] && this.specialTimer === 0 && this.attackTimer === 0 && this.energy >= 50) this.triggerUltimateSpecialAttack(target);
        
        if (input[bindings.freeze] && this.attackTimer === 0) {
            if (this.charKey === 'chosen') this.castIceFreezeBeam();
            if (this.charKey === 'orange') this.castEyeLasers();
        }
    }

    keepInStageBounds() {
        if (this.x < 0) this.x = 0;
        if (this.x > canvas.width - this.w) this.x = canvas.width - this.w;
        if (this.y >= floorY - this.h) {
            if (!this.grounded && this.vy > 2) {
                this.squashX = 1.3; this.squashY = 0.7;
                if (this.charKey === 'red' && this.specialTimer > 0) {
                    let p1 = { owner: this.id, x: this.x + this.w/2, y: floorY - 5, vx: 11, type: 'fissure', color: '#ff2a2a', r: 45, dmg: 35 };
                    let p2 = { owner: this.id, x: this.x + this.w/2, y: floorY - 5, vx: -11, type: 'fissure', color: '#ff2a2a', r: 45, dmg: 35 };
                    liveProjectiles.push(p1, p2);
                    screenShake = 24;
                }
            }
            this.y = floorY - this.h;
            this.vy = 0;
            this.grounded = true;
            if (this.charKey !== 'orange' || this.awakenedTimer <= 0) this.isFlying = false;
        }
    }

    meleeStrike(target) {
        this.attackTimer = 25;
        let lookDir = this.facing === 'right' ? 1 : -1;

        if (this.charKey === 'orange' && this.awakenedTimer > 0) {
            let dx = (target.x + target.w/2) - (this.x + this.w/2);
            let dy = (target.y + target.h/2) - (this.y + this.h/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + 40, vx: (dx / dist) * 19, vy: (dy / dist) * 19, type: 'laserbeam', color: '#00ff66', r: 14, dmg: 16 });
            return;
        }

        let strikeReach = 120;
        let attackZoneX = this.facing === 'right' ? this.x + this.w : this.x - strikeReach;

        if (attackZoneX + strikeReach > target.x && attackZoneX < target.x + target.w &&
            this.y + this.h > target.y && this.y < target.y + target.h) {
            
            let dmg = this.charKey === 'red' ? 32 : 16;
            target.takeHit(dmg, this.facing);
            hitStopTimer = 5;
            screenShake = 14;
        }

        if (this.charKey === 'blue') { 
            liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + 40, vx: lookDir * 11, vy: -5, type: 'potion', color: '#9c27b0', r: 12, dmg: 15 });
        }
        if (this.charKey === 'green') { 
            liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + 35, vx: lookDir * 15, vy: -1.5, type: 'hook', color: '#ff2222', r: 8, dmg: 14 });
        }
    }

    triggerLongRangeFarAttack(target) {
        this.attackTimer = 35;
        this.farAttackVisualTimer = 25; 
        
        liveProjectiles.push({
            owner: this.id, x: target.x + target.w/2, y: target.y + target.h/2,
            vx: 0, vy: 0, type: 'teleblast', color: '#ff4500', r: 65, dmg: 25
        });
        
        target.takeHit(25, this.x < target.x ? 'right' : 'left');
        screenShake = 20;
        hitStopTimer = 4;
    }

    castEyeLasers() {
        this.attackTimer = 30;
        this.eyeLaserActiveTimer = 20; 
        let lookDir = this.facing === 'right' ? 1 : -1;

        liveProjectiles.push({
            owner: this.id, x: this.x + this.w/2 + (lookDir * 25), y: this.y + 20, 
            vx: lookDir * 22, vy: 0, type: 'eyelaser', color: '#ff1a1a', r: 14, dmg: 22
        });
        screenShake = 15;
    }

    triggerUltimateSpecialAttack(target) {
        this.energy -= 50;
        let lookDir = this.facing === 'right' ? 1 : -1;

        switch(this.charKey) {
            case 'orange': {
                this.awakenedTimer = 300; 
                this.isFlying = true;
                this.vy = -5; 
                screenShake = 30;
                for (let angleIdx = 0; angleIdx < 8; angleIdx++) { 
                    let ang = (angleIdx / 8) * Math.PI * 2;
                    liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + this.h/2, vx: Math.cos(ang) * 12, vy: Math.sin(ang) * 12, type: 'spark', color: '#00ff66', r: 20, dmg: 20 });
                }
                break;
            }
            case 'chosen': {
                liveProjectiles.push({ owner: this.id, x: this.x + (lookDir * 50), y: this.y + 35, vx: lookDir * 12, vy: 0, type: 'dragonfire', color: '#ff2200', r: 55, dmg: 45 });
                screenShake = 28;
                break;
            }
            case 'green': {
                for (let angleIdx = 0; angleIdx < 6; angleIdx++) {
                    let ang = (angleIdx / 6) * Math.PI * 2;
                    liveProjectiles.push({ owner: this.id, x: this.x + this.w/2, y: this.y + this.h/2, vx: Math.cos(ang) * 11, vy: Math.sin(ang) * 11, type: 'musicwave', color: '#00ffcc', r: 18, dmg: 14 });
                }
                screenShake = 22;
                break;
            }
            case 'red': {
                this.specialTimer = 45; 
                break;
            }
            case 'blue': {
                for (let a = 0; a < 5; a++) { liveProjectiles.push({ owner: this.id, x: target.x + (Math.random() * 120 - 60), y: 0, vx: 0, vy: 18, type: 'arrow', color: '#2a75ff', r: 8, dmg: 12 }); }
                screenShake = 15;
                break;
            }
            case 'yellow': {
                liveProjectiles.push({ owner: this.id, x: target.x + target.w/2, y: 0, vx: 0, vy: 28, type: 'thunderstrike', color: '#f7f711', r: 35, dmg: 35 });
                screenShake = 24;
                break;
            }
        }
    }

    castIceFreezeBeam() {
        this.attackTimer = 30;
        let lookDir = this.facing === 'right' ? 1 : -1;
        liveProjectiles.push({ owner: this.id, x: this.x + (this.w/2) + (lookDir * 35), y: this.y + 45, vx: lookDir * 16, vy: 0, type: 'icebeam', color: '#00ffff', r: 12, dmg: 5 });
    }

    takeHit(amount, fromSideDirection) {
        this.health = (this.health || this.hp) - amount;
        this.hp = this.health; 
        this.stunTimer = 18;
        if (this.charKey !== 'orange' || this.awakenedTimer <= 0) this.isFlying = false;
        this.vy = -6.5;
        this.vx = fromSideDirection === 'right' ? 11 : -11;
        spawnSquarePixelParticles(this.x + this.w/2, this.y + this.h/2, this.meta.color, 25);
    }
}

let player1, player2;

function beginMatch() {
    player1 = new Fighter(1, 220, 'right', rosterKeys[p1Sel]);
    player2 = new Fighter(2, 980, 'left', rosterKeys[p2Sel]);
    
    document.getElementById('p1-tag').innerText = player1.meta.name;
    document.getElementById('p1-tag').style.color = player1.meta.color === '#000000' ? '#ffffff' : player1.meta.color;
    document.getElementById('p2-tag').innerText = player2.meta.name;
    document.getElementById('p2-tag').style.color = player2.meta.color === '#000000' ? '#ffffff' : player2.meta.color;
    
    combatHUD.style.display = 'flex';
    currentScene = SCENE_FIGHT;
}

function spawnSquarePixelParticles(x, y, color, count) {
    let finalColor = color === '#000000' ? '#444444' : color;
    for(let i=0; i<count; i++) {
        liveParticles.push({
            x, y,
            vx: (Math.random() - 0.5) * 11,
            vy: (Math.random() - 0.5) * 11,
            w: 7, h: 7, 
            color: finalColor, life: 20
        });
    }
}

function runGameEngineLoop() {
    updateEngine();
    renderEngine();
    requestAnimationFrame(runGameEngineLoop);
}

function updateEngine() {
    if (currentScene === SCENE_MENU) return;

    if (currentScene === SCENE_FIGHT) {
        if (hitStopTimer > 0) {
            hitStopTimer--;
            return; 
        }

        blockyCloudsArray.forEach(cloud => {
            cloud.x += cloud.speed;
            if (cloud.x > canvas.width) cloud.x = -cloud.w;
        });

        let p1Bindings = { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', attack: 'KeyF', special: 'KeyG', freeze: 'KeyH', holdKey: 'KeyF' };
        let p2Bindings = { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', attack: 'KeyN', special: 'KeyM', freeze: 'KeyJ', holdKey: 'KeyN' };

        player1.update(p1Bindings, player2);
        player2.update(p2Bindings, player1);

        for (let i = liveProjectiles.length - 1; i >= 0; i--) {
            let p = liveProjectiles[i];
            p.x += p.vx;
            if (p.vy) p.y += p.vy;

            if (p.type === 'potion') {
                p.vy += 0.35;
                if (p.y >= floorY - 12) { 
                    spawnSquarePixelParticles(p.x, floorY, p.color, 16);
                    let competitors = [player1, player2];
                    competitors.forEach(t => {
                        if (Math.abs(p.x - (t.x + t.w/2)) < 95 && t.y + t.h >= floorY - 45) {
                            t.takeHit(16, p.vx > 0 ? 'right' : 'left');
                        }
                    });
                    liveProjectiles.splice(i, 1);
                    continue;
                }
            }

            if (p.x < -100 || p.x > canvas.width + 100 || p.y > canvas.height + 50) {
                liveProjectiles.splice(i, 1);
                continue;
            }

            let targets = [player1, player2];
            targets.forEach(t => {
                if (p.owner !== t.id && p.x > t.x && p.x < t.x + t.w && p.y > t.y && p.y < t.y + t.h) {
                    if (p.type === 'icebeam') {
                        t.frozenTimer = 90; 
                        t.isFlying = false;
                        spawnSquarePixelParticles(t.x + t.w/2, t.y + t.h/2, '#00ffff', 25);
                    } else if (p.type !== 'teleblast') {
                        t.takeHit(p.dmg || 12, p.vx > 0 ? 'right' : (p.vx < 0 ? 'left' : 'right'));
                    }
                    if (p.type !== 'teleblast') liveProjectiles.splice(i, 1);
                    return;
                }
            });

            if (p.type === 'teleblast') {
                p.r += 2.5;
                if (p.r > 105) liveProjectiles.splice(i, 1);
            }
        }

        for (let j = liveParticles.length - 1; j >= 0; j--) {
            let pt = liveParticles[j];
            pt.x += pt.vx; pt.y += pt.vy;
            pt.life--;
            if (pt.life <= 0) liveParticles.splice(j, 1);
        }

        document.getElementById('p1-hp').style.width = `${Math.max(0, (player1.hp / player1.maxHp) * 100)}%`;
        document.getElementById('p2-hp').style.width = `${Math.max(0, (player2.hp / player2.maxHp) * 100)}%`;
        document.getElementById('p1-energy').style.width = `${player1.energy}%`;
        document.getElementById('p2-energy').style.width = `${player2.energy}%`;

        if (player1.hp <= 0 || player2.hp <= 0) currentScene = SCENE_OVER;
    }
}

function renderEngine() {
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random() - 0.5)*screenShake, (Math.random() - 0.5)*screenShake);
        screenShake *= 0.88;
    }

    if (currentScene === SCENE_MENU) {
        renderSelectionGridScene();
    } else {
        renderBattlefieldScene();
    }
    ctx.restore();
}

function renderSelectionGridScene() {
    ctx.fillStyle = '#06060f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#1a1a2e';
    for(let gx=0; gx<canvas.width; gx+=40) { ctx.fillRect(gx, 0, 2, canvas.height); }

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 34px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ANIMATION VS ANIMATOR: SELECTION DECK', canvas.width/2, 85);

    let cardW = 180;
    let startX = (canvas.width - (rosterKeys.length * (cardW + 16))) / 2;

    rosterKeys.forEach((key, idx) => {
        let cx = startX + idx * (cardW + 16);
        let cy = 210;

        ctx.fillStyle = '#0d0d18';
        if (p1Sel === idx) ctx.fillStyle = '#3c230d';
        if (p2Sel === idx) ctx.fillStyle = '#0c233c';
        ctx.fillRect(cx, cy, cardW, 330);
        
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = (p1Sel === idx || p2Sel === idx) ? 5 : 2;
        ctx.strokeRect(cx, cy, cardW, 330);

        drawStickmanModelSkeletonRig(cx + cardW/2, cy + 185, ROSTER[key].color, 'right', 0, 0, 0, false, 1, 1, key, false, false, 0, []);

        ctx.fillStyle = ROSTER[key].color === '#000000' ? '#ffffff' : ROSTER[key].color;
        ctx.font = 'bold 14px monospace';
        ctx.fillText(ROSTER[key].name.toUpperCase(), cx + cardW/2, cy + 35);
        ctx.fillStyle = '#999';
        ctx.font = '11px monospace';
        ctx.fillText(`Weapon: ${ROSTER[key].weaponName}`, cx + cardW/2, cy + 260);

        if (p1Sel === idx) { ctx.fillStyle = '#ff9900'; ctx.fillText(p1Ready ? 'READY' : '[P1] CHOOSE: F', cx + cardW/2, cy - 15); }
        if (p2Sel === idx) { ctx.fillStyle = '#00aaff'; ctx.fillText(p2Ready ? 'READY' : '[P2] CHOOSE: M', cx + cardW/2, cy + 355); }
    });
}

function renderBattlefieldScene() {
    let dayGradient = ctx.createLinearGradient(0, 0, 0, floorY);
    dayGradient.addColorStop(0, '#4fc3f7');
    dayGradient.addColorStop(1, '#e3f2fd');
    ctx.fillStyle = dayGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#fbc02d'; ctx.fillRect(1100, 60, 80, 80); 
    ctx.fillStyle = '#fff176'; ctx.fillRect(1080, 80, 120, 40); ctx.fillRect(1120, 40, 40, 120); 

    ctx.fillStyle = '#ffffff';
    blockyCloudsArray.forEach(cloud => {
        ctx.fillRect(cloud.x, cloud.y, cloud.w, cloud.h);
        ctx.fillRect(cloud.x + 20, cloud.y - 15, cloud.w - 40, 15); 
        ctx.fillRect(cloud.x - 15, cloud.y + 10, cloud.w + 30, cloud.h - 20); 
    });

    ctx.fillStyle = '#4caf50'; ctx.fillRect(0, floorY, canvas.width, 35);
    ctx.fillStyle = '#8d6e63'; ctx.fillRect(0, floorY + 35, canvas.width, canvas.height - (floorY + 35));
    ctx.fillStyle = '#111'; ctx.fillRect(0, floorY, canvas.width, 4);

    liveProjectiles.forEach(p => {
        ctx.save();
        ctx.fillStyle = p.color;
        
        if (p.type === 'dragonfire') {
            ctx.fillRect(p.x - p.r, p.y - p.r, p.r*2, p.r*2);
            ctx.fillStyle = '#ff9100'; ctx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
        } else if (p.type === 'fissure') {
            ctx.fillRect(p.x - 15, floorY - p.r, 30, p.r);
        } else if (p.type === 'thunderstrike') {
            ctx.fillStyle = '#ffffff'; ctx.fillRect(p.x - 15, 0, 30, floorY);
        } else if (p.type === 'eyelaser') {
            ctx.strokeStyle = '#ff1a1a'; ctx.lineWidth = 14;
            ctx.beginPath(); ctx.moveTo(p.x - p.vx, p.y); ctx.lineTo(p.x, p.y); ctx.stroke();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(p.x - p.vx, p.y); ctx.lineTo(p.x, p.y); ctx.stroke();
        } else if (p.type === 'teleblast') {
            ctx.lineWidth = 4; ctx.strokeStyle = '#ff3300';
            ctx.strokeRect(p.x - p.r, p.y - p.r, p.r*2, p.r*2);
        } else if (p.type === 'potion') { 
            ctx.fillRect(p.x - 8, p.y - 8, 16, 20);
            ctx.fillStyle = '#795548'; ctx.fillRect(p.x - 3, p.y - 14, 6, 6); 
        } else if (p.type === 'hook') { 
            ctx.fillStyle = '#ffffff'; ctx.fillRect(p.x - 8, p.y - 8, 16, 16);
            ctx.fillStyle = '#ff2222'; ctx.fillRect(p.x - 8, p.y - 8, 16, 8); 
        } else {
            ctx.fillRect(p.x - p.r, p.y - p.r, p.r*2, p.r*2);
        }
        ctx.restore();
    });

    liveParticles.forEach(pt => {
        ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, pt.w, pt.h);
    });

    let frameCount = Math.floor(Date.now() / 80) % 4; 

    drawStickmanModelSkeletonRig(player1.x + player1.w/2, player1.y + 20, player1.meta.color, player1.facing, player1.attackTimer, player1.farAttackVisualTimer, frameCount, player1.isFlying, player1.squashX, player1.squashY, player1.charKey, player1.frozenTimer > 0, player1.awakenedTimer > 0, player1.eyeLaserActiveTimer, player1.motionTrail);
    drawStickmanModelSkeletonRig(player2.x + player2.w/2, player2.y + 20, player2.meta.color, player2.facing, player2.attackTimer, player2.farAttackVisualTimer, frameCount, player2.isFlying, player2.squashX, player2.squashY, player2.charKey, player2.frozenTimer > 0, player2.awakenedTimer > 0, player2.eyeLaserActiveTimer, player2.motionTrail);

    if (currentScene === SCENE_OVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 54px monospace';
        ctx.textAlign = 'center';
        let winner = player1.hp > 0 ? player1.meta.name : player2.meta.name;
        ctx.fillText(`${winner.toUpperCase()} VICTORIOUS!`, canvas.width/2, canvas.height/2);
        ctx.font = '20px monospace';
        ctx.fillStyle = '#555';
        ctx.fillText('Press F5 to restart match sessions.', canvas.width/2, canvas.height/2 + 60);
    }
}

function drawStickmanModelSkeletonRig(hx, hy, baseColor, faceStr, attTicks, farAttTicks, walkCycleFrame, isFlying, sqX, sqY, charKey, isFrozen, isAwakened, laserTicks, trail = []) {
    ctx.save();
    let flip = faceStr === 'left' ? -1 : 1;

    ctx.translate(hx, hy + 60);
    ctx.scale(sqX, sqY);
    ctx.translate(-hx, -(hy + 60));

    if(trail.length > 1 && currentScene === SCENE_FIGHT) {
        ctx.save();
        ctx.fillStyle = baseColor === '#000000' ? '#222222' : baseColor; ctx.globalAlpha = 0.12;
        trail.forEach(t => { ctx.fillRect(t.x - 12, t.y - 12, 24, 24); });
        ctx.restore();
    }

    drawProceduralStickSegments(hx, hy, '#000000', flip, attTicks, farAttTicks, walkCycleFrame, isFlying, charKey, 11, 11, isSpecActive = false, isAwakened, laserTicks);

    let layerColor = isFrozen ? '#a0e5ff' : (isAwakened ? '#00ff66' : baseColor);
    drawProceduralStickSegments(hx, hy, layerColor, flip, attTicks, farAttTicks, walkCycleFrame, isFlying, charKey, 6, 6, isSpecActive = false, isAwakened, laserTicks);

    if (isFrozen) {
        ctx.fillStyle = 'rgba(0, 235, 255, 0.4)';
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
        ctx.fillRect(hx - 45, hy - 30, 90, 155); ctx.strokeRect(hx - 45, hy - 30, 90, 155);
    }
    ctx.restore();
}

function drawProceduralStickSegments(hx, hy, color, flip, attTicks, farAttTicks, walkCycleFrame, isFlying, charKey, thickness, headThickness, isSpecActive, isAwakened, laserTicks) {
    ctx.save();
    ctx.fillStyle = color;

    let armSwingX = 0;
    let leftLegX = 0, rightLegX = 0;
    let leftLegY = 0, rightLegY = 0;

    let targetRigObj = player1 ? (charKey === player1.charKey ? player1 : player2) : null;
    let isMovingHorizontally = targetRigObj ? Math.abs(targetRigObj.vx) > 0.5 : false;

    if (isMovingHorizontally && !isFlying && farAttTicks <= 0) {
        if (walkCycleFrame === 0) { leftLegX = -18; rightLegX = 18; armSwingX = 14; }
        else if (walkCycleFrame === 1) { leftLegX = -6; rightLegX = 6; leftLegY = -10; armSwingX = 0; }
        else if (walkCycleFrame === 2) { leftLegX = 18; rightLegX = -18; armSwingX = -14; }
        else if (walkCycleFrame === 3) { leftLegX = 6; rightLegX = -6; rightLegY = -10; armSwingX = 0; }
    }

    if (isFlying) {
        leftLegX = -6 * flip; rightLegX = -6 * flip;
        leftLegY = -15; rightLegY = -15;
    }

    // Head Unit
    if (ROSTER[charKey].hollow) {
        ctx.fillRect(hx - 22, hy - 22, 44, headThickness); 
        ctx.fillRect(hx - 22, hy + 22 - headThickness, 44, headThickness); 
        ctx.fillRect(hx - 22, hy - 22, headThickness, 44); 
        ctx.fillRect(hx + 22 - headThickness, hy - 22, headThickness, 44); 
        
        if (color !== '#000000') {
            ctx.fillStyle = currentScene === SCENE_MENU ? '#0d0d18' : '#4fc3f7'; 
            ctx.fillRect(hx - 22 + headThickness, hy - 22 + headThickness, 44 - headThickness * 2, 44 - headThickness * 2);
            ctx.fillStyle = color; 
        }
        
        if (charKey === 'chosen' && color !== '#000000') {
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(hx - 8, hy - 6, 6, 6); ctx.fillRect(hx + 4, hy - 6, 6, 6);
            ctx.fillStyle = color;
        }
    } else {
        ctx.fillRect(hx - 22, hy - 22, 44, 44);
    }

    if (charKey === 'orange' && laserTicks > 0) {
        ctx.save();
        ctx.fillStyle = color === '#000000' ? '#000000' : '#ff1a1a';
        ctx.fillRect(hx + (12 * flip), hy - 6, flip * 450, 14);
        if (color !== '#000000') {
            ctx.fillStyle = '#ffffff'; ctx.fillRect(hx + (12 * flip), hy - 2, flip * 450, 4);
        }
        ctx.restore();
    }

    if (charKey === 'red' && color !== '#000000') {
        ctx.fillStyle = '#ffff00'; 
        ctx.fillRect(hx - 24, hy - 6, 48, 8); 
        ctx.fillRect(hx - (28 * flip), hy + 2, 8 * flip, 18); 
        ctx.fillStyle = color;
    }

    let neckY = hy + 22;
    let pelvisY = neckY + 45;

    // Torso Spine
    ctx.fillRect(hx - thickness/2, neckY, thickness, 45);

    // Legs
    ctx.fillRect(hx + (leftLegX * flip) - thickness/2, pelvisY, thickness, 30 + leftLegY);
    ctx.fillRect(hx + (leftLegX * flip) - thickness/2, pelvisY + 30 + leftLegY, 12 * flip, thickness);
    ctx.fillRect(hx + (rightLegX * flip) - thickness/2, pelvisY, thickness, 30 + rightLegY);
    ctx.fillRect(hx + (rightLegX * flip) - thickness/2, pelvisY + 30 + rightLegY, 12 * flip, thickness);

    // Arms
    let handX = hx + 45 * flip;
    let handY = neckY + 20;

    let swingAngle = 0;
    if (attTicks > 0) {
        swingAngle = ((25 - attTicks) / 25) * Math.PI * 2 * flip;
    }

    if (charKey === 'chosen' && farAttTicks > 0) {
        ctx.fillRect(hx - 22 - thickness/2, neckY, thickness, 35); ctx.fillRect(hx - 22 - thickness/2, neckY - 25, 25, thickness);
        ctx.fillRect(hx + 22 - thickness/2, neckY, thickness, 35); ctx.fillRect(hx + 22 - thickness/2, neckY - 25, 25, thickness);
    } else if (attTicks > 0 || isAwakened) {
        handX = hx + 52 * flip + Math.cos(swingAngle) * 15;
        handY = neckY + 12 + Math.sin(swingAngle) * 15;
        ctx.fillRect(hx, neckY + 8, handX - hx, thickness);
    } else {
        handX = hx + (24 + armSwingX) * flip; handY = neckY + 30;
        ctx.fillRect(hx, neckY + 12, (24 + armSwingX) * flip, thickness);
        ctx.fillRect(handX - thickness/2, neckY + 12, thickness, 18);
    }

    // Weapons (Protected lexical scopes)
    if ((charKey !== 'chosen' || farAttTicks <= 0) && !isAwakened) {
        ctx.save();
        ctx.translate(handX, handY);
        ctx.rotate(swingAngle);

        if (charKey === 'orange') {
            ctx.fillStyle = color === '#000000' ? '#000000' : '#888888'; ctx.fillRect(0, -6, 26 * flip, 12);
            ctx.fillStyle = color === '#000000' ? '#000000' : '#ffaa00'; ctx.fillRect(26 * flip, -4, 8 * flip, 8);
        }
        else if (charKey === 'chosen') {
            ctx.fillStyle = color === '#000000' ? '#000000' : '#ff6600'; ctx.fillRect(-12, -12, 24, 24);
            ctx.fillStyle = color === '#000000' ? '#000000' : '#ffcc00'; ctx.fillRect(-6, -6, 12, 12);
        }
        else if (charKey === 'green') {
            ctx.fillStyle = color === '#000000' ? '#000000' : '#795548'; ctx.fillRect(-30 * flip, 20, 60 * flip, 8);
            ctx.fillStyle = color === '#000000' ? '#000000' : '#ffffff'; ctx.fillRect(30 * flip, -10, 2, 30);
        }
        else if (charKey === 'red') {
            ctx.fillRect(-8, -8, 16, 16);
        }
        else if (charKey === 'blue') {
            ctx.fillStyle = color === '#000000' ? '#000000' : '#9c27b0'; ctx.fillRect(-10, -8, 20, 24);
            ctx.fillStyle = color === '#000000' ? '#000000' : '#795548'; ctx.fillRect(-4, -14, 8, 6);
        }
        else if (charKey === 'yellow') {
            ctx.fillStyle = color === '#000000' ? '#000000' : '#78909c'; ctx.fillRect(-12, -6, 24, 26);
            ctx.fillStyle = color === '#000000' ? '#000000' : '#b0bec5'; ctx.fillRect(6 * flip, -24, 22 * flip, 24);
        }
        ctx.restore();
    } else if (isAwakened) {
        ctx.fillStyle = color === '#000000' ? '#000000' : '#00ff66';
        ctx.fillRect(handX - 10, handY - 10, 20, 20);
    }
    ctx.restore();
}

runGameEngineLoop();
</script>
